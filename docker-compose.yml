services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-audium}
      POSTGRES_USER: ${POSTGRES_USER:-audium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-audium_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-audium} -d ${POSTGRES_DB:-audium}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: >
      sh -c "alembic upgrade head &&
             uvicorn audium_app.api.main:app --host 0.0.0.0 --port 8000 --proxy-headers"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./audio:/app/audio:ro
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build: .
    command: python -m audium_app.bot.main
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
