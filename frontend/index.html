<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audium — звуковой wellness</title>
  <link rel="stylesheet" href="/theme.css">
  <style>
    .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700; margin-bottom: 1.5rem; }
    .hero p { color: var(--color-text-secondary); font-size: 1.15rem; max-width: 480px; margin-bottom: 2.5rem; }
    .btn-cta { background: var(--color-cta); color: #0B1623; font-weight: 700; font-size: 1rem; padding: .85rem 2.2rem; border: none; border-radius: var(--radius); cursor: pointer; text-decoration: none; }
    .accent { color: var(--color-accent); }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Мозг не выключается.<br><span class="accent">Audium</span> ему помогает.</h1>
    <p>Биноуральные биты и изохронные тоны для сна, фокуса и восстановления. 3 дня бесплатно — без ввода карты.</p>
    <a href="/app/" class="btn-cta">Начать бесплатно</a>
  </section>
</body>
</html>
